<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Recipe Database</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #4ade80; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 15px; margin: 0; text-align: center; }
        
        .header { position: sticky; top: 0; background: var(--bg); padding: 15px 0; z-index: 100; border-bottom: 1px solid #333; }
        h1 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.5rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .search-box { 
            width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; 
            border: 2px solid var(--accent); background: #000; color: #fff; outline: none;
            font-size: 1rem;
        }

        .gallery { display: flex; flex-direction: column; align-items: center; gap: 20px; padding-top: 20px; }
        
        .recipe-card { 
            background: var(--card); border: 1px solid #333; border-radius: 12px; 
            padding: 20px; width: 100%; max-width: 450px; box-sizing: border-box;
            animation: fadeIn 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { margin: 0; font-size: 1.3rem; color: var(--accent); }
        .recipe-img { width: 100%; height: auto; border-radius: 6px; margin: 15px 0; border: 1px solid #444; }
        .description { color: #bbb; font-size: 0.95rem; line-height: 1.5; text-align: center; border-top: 1px solid #333; padding-top: 15px; }
        .hint { color: #888; font-size: 0.8rem; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>MC Crafting Guide</h1>
        <input type="text" id="search" class="search-box" placeholder="Search for items A-L...">
        <p id="status" class="hint">Showing Featured Items</p>
    </div>
    
    <div id="gallery" class="gallery"></div>

        { name: "Lantern", desc: "A stylish and bright light source that can be placed on blocks or hung from ceilings and chains.", link: "https://minecraft-max.net/upload/webp/upload/iblock/9bf/jyqmvv4sb5o0i04djrbstuy0d54osr0h.webp" },
        { name: "Lead", desc: "Used to tie and lead mobs around, or to tether them to fence posts.", link: "https://minecraft-max.net/upload/webp/upload/iblock/cf9/lpv63eedwac08mfy1u284irqzxt8u16a.webp" },
        { name: "Leather Cap", desc: "The weakest tier of head protection, but can be dyed any color.", link: "https://minecraft-max.net/upload/webp/upload/iblock/d68/d68dd44f89dc8d4159432c6f29d30541.webp" },
        { name: "Leather Tunic", desc: "A chestpiece made of leather. Popular for team uniforms since it can be dyed.", link: "https://minecraft-max.net/upload/webp/upload/iblock/a14/a145dce215bdfd5664c632737712f4b6.webp" },
        { name: "Leather Pants", desc: "Leg protection made from leather. Useful for cold biomes and cosmetic customization.", link: "https://minecraft-max.net/upload/webp/upload/iblock/288/288bdb37f666ecc879ea103d666acb06.webp" },
        { name: "Leather Boots", desc: "Basic foot protection. Prevents the player from sinking into Powder Snow blocks.", link: "https://minecraft-max.net/upload/webp/upload/iblock/ca4/ca4082bb901ea7eb849ba33017808ed8.webp" },
        { name: "Lectern", desc: "A librarian's workstation. It holds books for multiple players to read at once and sends redstone signals when pages turn.", link: "https://minecraft-max.net/upload/webp/upload/iblock/d1a/hn78srn5j6d6fqpoy9bxggxpet5537c4.webp" },
        { name: "Lever", desc: "A toggleable switch that provides a constant redstone signal until flipped back.", link: "https://minecraft-max.net/upload/webp/upload/iblock/1c0/1c03b531424122439461eb11af95111f.webp" },
        { name: "Light Weighted Pressure Plate", desc: "A gold pressure plate. It is very sensitive and provides a signal strength based on the exact number of entities.", link: "https://minecraft-max.net/upload/webp/upload/iblock/1b5/1b555773509c4f1191b3d583a281467f.webp" },
        { name: "Lightning Rod", desc: "Diverts lightning strikes to its position, protecting nearby flammable buildings from fire.", link: "https://minecraft-max.net/upload/webp/upload/iblock/c07/ysxzz8b6iq1xyrrang1q3xfoa53x203e.webp" },
        { name: "Loom", desc: "Used to apply patterns to banners using dyes and banner patterns.", link: "https://minecraft-max.net/upload/webp/upload/iblock/0c1/yvfwp62q3thkpl7k60kvvhb3zmt1koqs.webp" }
    ];

    function render(query = "") {
        const out = document.getElementById('gallery');
        const status = document.getElementById('status');
        out.innerHTML = "";
        
        let filtered;
        if (query === "") {
            filtered = RECIPES.slice(0, 3); // Shows featured items by default
            status.innerText = "Showing Featured Items";
        } else {
            filtered = RECIPES.filter(r => r.name.toLowerCase().includes(query.toLowerCase()));
            status.innerText = `Found ${filtered.length} results`;
        }

        filtered.forEach(recipe => {
            out.innerHTML += `
                <div class="recipe-card">
                    <h2>${recipe.name}</h2>
                    <img src="${recipe.link}" class="recipe-img" alt="${recipe.name}">
                    <p class="description">${recipe.desc}</p>
                </div>
            `;
        });
    }

    document.getElementById('search').oninput = (e) => render(e.target.value);
    render();
</script>
</body>
</html>
