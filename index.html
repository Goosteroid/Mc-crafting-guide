<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Recipe Database</title>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: rgba(30, 41, 59, 0.7); 
            --accent: #10b981; 
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        body { 
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            color: var(--text-main); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            padding: 0; 
            margin: 0; 
            min-height: 100vh;
        }

        .header { 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 30px 20px; 
            z-index: 100; 
            border-bottom: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 { 
            margin: 0 0 15px 0; 
            color: var(--accent); 
            font-size: 2.2rem; 
            font-weight: 800;
            text-transform: uppercase; 
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        .search-box { 
            width: 90%; 
            max-width: 500px; 
            padding: 14px 25px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(0,0,0,0.3); 
            color: #fff; 
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box:focus {
            border-color: var(--accent);
            background: rgba(0,0,0,0.5);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .gallery { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
            gap: 30px; 
        }

        .recipe-card { 
            background: var(--card); 
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 28px; 
            padding: 40px 30px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeIn 0.5s ease backwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .recipe-card:hover { 
            transform: translateY(-12px);
            background: rgba(30, 41, 59, 0.95);
            border-color: var(--accent);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { 
            margin: 25px 0 12px 0; 
            font-size: 1.5rem; 
            color: #fff; 
            font-weight: 700;
            text-align: center;
        }

        .recipe-img { 
            width: 180px; 
            height: 180px; 
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0,0,0,0.7));
            transition: transform 0.4s ease, filter 0.4s ease;
        }

        .recipe-card:hover .recipe-img {
            transform: scale(1.1) rotate(3deg);
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));
        }

        .description { 
            color: var(--text-dim); 
            font-size: 1rem; 
            line-height: 1.6; 
            text-align: center; 
            margin: 0;
            max-width: 90%;
        }

        .hint { 
            color: var(--text-dim); 
            font-size: 0.95rem; 
            margin-top: 10px; 
            font-weight: 300;
        }
    </style>
</head>

    function render(query = "") {
        const out = document.getElementById('gallery');
        const status = document.getElementById('status');
        out.innerHTML = "";
        
        let filtered;
        if (query === "") {
            filtered = RECIPES.slice(0, 15); 
            status.innerText = "Featured Collection";
        } else {
            filtered = RECIPES.filter(r => r.name.toLowerCase().includes(query.toLowerCase()));
            status.innerText = `${filtered.length} items found`;
        }

        filtered.forEach((recipe, index) => {
            const card = document.createElement('div');
            card.className = 'recipe-card';
            card.style.animationDelay = `${index * 0.05}s`;
            
            card.innerHTML = `
                <img src="${recipe.link}" class="recipe-img" alt="${recipe.name}">
                <h2>${recipe.name}</h2>
                <p class="description">${recipe.desc}</p>
            `;
            out.appendChild(card);
        });
    }

    document.getElementById('search').oninput = (e) => render(e.target.value);
    render();
</script>
